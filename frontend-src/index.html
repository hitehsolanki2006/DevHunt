<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevHunt — AI Assistant &amp; IDE</title>
    <meta name="description" content="DevHunt: Your local AI-powered IDE, quest board, knowledge vault, and coding companion." />

    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Google Fonts (matching original) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fira+Sans:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&family=Outfit:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="theme-slate">
    <div id="root">
      <div class="initial-loader-container">
        <div class="cyber-spinner"></div>
        <div class="loader-text">BOOTING DEVHUNT AI CORES...</div>
      </div>
      <style>
        .initial-loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #0b0f14;
          color: #10b981;
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          letter-spacing: 2px;
        }
        .cyber-spinner {
          width: 50px;
          height: 50px;
          border: 3px solid rgba(16, 185, 129, 0.1);
          border-top-color: #10b981;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
          box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
