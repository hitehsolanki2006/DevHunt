<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | DevHunt</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#10b981" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    :root {
      --bg: #060608;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dark: #4b5563;
      --accent: #10b981;
      --accent-dim: #059669;
      --border: rgba(255, 255, 255, 0.06);
      --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background Glow */
    body::before {
      content: '';
      position: fixed;
      top: -300px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.04) 0%, rgba(16, 185, 129, 0) 70%);
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }

    .error-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 24px;
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.5)); }
    }

    .error-title {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .error-message {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .logo-wrapper {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2px;
      background: rgba(255, 255, 255, 0.01);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      background: linear-gradient(135deg, #ffffff 40%, #a3a3a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background: #ffffff;
      color: #060608;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.08);
    }

    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-1.5px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1.5px);
    }

    .helpful-links {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .helpful-links h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .link-item {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: block;
    }

    .link-item:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      .actions {
        flex-direction: column;
        width: 100%;
      }
      .btn {
        width: 100%;
      }
      .link-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <img class="logo-img" src="logo.png" alt="DevHunt Logo" />
      <span class="logo-text">DEVHUNT</span>
    </div>

    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved. 
      Let's get you back on track.
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">← Back to Home</a>
      <a href="docs.html" class="btn btn-secondary">View Documentation</a>
    </div>

    <div class="helpful-links">
      <h3>Quick Links</h3>
      <div class="link-grid">
        <a href="index.html#features" class="link-item">Features</a>
        <a href="index.html#setup" class="link-item">Setup Guide</a>
        <a href="index.html#download" class="link-item">Download</a>
        <a href="https://github.com/hitehsolanki2006/DevHunt" class="link-item" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </div>
</body>
</html>
