name: 🚀 DevHunt CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-src/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: |
          cd frontend-src
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: 🛠️ Build Frontend (Verify Compilation)
        run: |
          cd frontend-src
          npm run build
