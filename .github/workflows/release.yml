name: 📦 Build and Release DevHunt Windows Installers

on:
  push:
    branches: [ "main" ]
  create:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-src/package-lock.json

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 🦀 Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Python Backend Requirements & Compile Binary
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
          pyinstaller devhunt_backend.spec
        shell: bash

      - name: 📦 Install Frontend Dependencies & Build React
        run: |
          cd frontend-src
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          npm run build
        shell: bash

      - name: 🛠️ Build Windows Tauri Installer (EXE & MSI)
        run: |
          cd frontend-src
          npm run tauri build
        shell: bash

      - name: 📂 Locate and Rename Installers
        id: locate-installers
        run: |
          mkdir -p output_bins
          cp frontend-src/src-tauri/target/release/bundle/nsis/*.exe output_bins/DevHunt_Setup.exe || true
          cp frontend-src/src-tauri/target/release/bundle/msi/*.msi output_bins/DevHunt_Setup.msi || true
        shell: bash

      - name: 🚀 Publish GitHub Pre-Release / Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output_bins/DevHunt_Setup.exe
            output_bins/DevHunt_Setup.msi
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'DevHunt Beta Nightly' }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          draft: false
          body: |
            Automated compile build for DevHunt Node client.
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Status: ${{ github.ref_type == 'tag' && 'Stable Release' || 'Beta Nightly Build (Unstable)' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
