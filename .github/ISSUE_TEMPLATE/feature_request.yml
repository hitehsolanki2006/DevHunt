name: 💡 Feature Request
description: Propose a new feature, canvas game, theme, or improvement for DevHunt.
labels: ["enhancement", "proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make DevHunt better? We'd love to hear it! Please check existing feature requests before submitting a new one.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the friction or limitation you encountered.
      placeholder: I feel that the current...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of what you want to happen.
      placeholder: It would be awesome if we could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives You've Considered
      description: Any alternative paths, styling hooks, or mock methods you thought about.
      placeholder: I tried to manually do...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any visual layouts, UI diagrams, or extra context that might help implement this feature.
      placeholder: Link to screenshots or upload mockups...
    validations:
      required: false
